site_name: OpenTalking
site_description: Open-source real-time digital-human orchestration layer with pluggable model backends, LLM, TTS, WebRTC, and character voices.
site_url: https://datascale-ai.github.io/opentalking/
repo_url: https://github.com/datascale-ai/opentalking
repo_name: datascale-ai/opentalking
edit_uri: edit/main/docs/

exclude_docs: |
  superpowers/
  requirements.txt
  */design/architecture-review.md
  */design/realtime-digital-human-research.md
  */design/wav2lip-v2-integration.md
  */roadmap/

theme:
  name: material
  language: zh
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/datascale-ai/opentalking

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: zh
          name: 中文
          default: true
          build: true
          nav_translations:
            Home: 首页
            Tutorials: 教程
            Cases: 案例
            Model Deployment: 模型部署
            Docs: 文档
            API Interfaces: API 接口
            Quickstart: 快速上手
            Installation: 安装
            Configuration: 配置
            Mock E2E: Mock 端到端
            Wav2Lip Integration: Wav2Lip 接入
            FlashTalk Integration: FlashTalk 接入
            Custom Avatar: 自定义 Avatar
            Models: 模型
            Support Matrix: 支持矩阵
            LLM and STT: LLM 与 STT
            Text-to-Speech: 语音合成
            Avatar Assets: Avatar 资产
            Talking-Head Models: Talking-head 模型
            Mock: Mock
            Wav2Lip: Wav2Lip
            MuseTalk: MuseTalk
            QuickTalk: QuickTalk
            FlashTalk: FlashTalk
            FlashHead: FlashHead
            Deployment: 部署
            Avatar Format: Avatar 资产格式
            Render Pipeline: 渲染管线
            Architecture: 架构设计
            Developing: 开发流程
            Model Adapter: 模型适配器
            Contributing: 贡献指南
            Community: 社区
            Overview: 概览
            Metrics: 指标定义
            Runbook: 运行方法
            Results and Baselines: 结果与基线
            Health and Models: 健康检查与模型
            Avatars: 数字人形象
            Sessions: 会话
            TTS and Voices: TTS 与音色
            Events and Streaming: 事件与流式接口
        - locale: en
          name: English
          build: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Quickstart: tutorials/quickstart.md
      - Installation: tutorials/installation.md
      - Configuration: tutorials/configuration.md
      - Cases:
          - Mock E2E: tutorials/cases/mock-e2e.md
          - Wav2Lip Integration: tutorials/cases/wav2lip.md
          - FlashTalk Integration: tutorials/cases/flashtalk.md
          - Custom Avatar: tutorials/cases/custom-avatar.md
  - Model Deployment:
      - Overview: model-deployment/index.md
      - Support Matrix: model-deployment/support-matrix.md
      - LLM and STT: model-deployment/llm-stt.md
      - Text-to-Speech: model-deployment/tts.md
      - Avatar Assets: model-deployment/avatar.md
      - Talking-Head Models:
          - Overview: model-deployment/talking-head.md
          - Mock: model-deployment/mock.md
          - Wav2Lip: model-deployment/wav2lip.md
          - MuseTalk: model-deployment/musetalk.md
          - QuickTalk: model-deployment/quicktalk.md
          - FasterLivePortrait: model-deployment/fasterliveportrait.md
          - FlashTalk: model-deployment/flashtalk.md
          - FlashHead: model-deployment/flashhead.md
      - Deployment: model-deployment/deployment.md
  - Docs:
      - Overview: docs/index.md
      - Architecture: docs/architecture.md
      - Render Pipeline: docs/render-pipeline.md
      - Avatar Format: docs/avatar-format.md
      - Model Adapter: docs/model-adapter.md
      - Developing: docs/developing.md
      - API Interfaces:
          - Overview: docs/api/index.md
          - Health and Models: docs/api/health.md
          - Avatars: docs/api/avatars.md
          - Sessions: docs/api/sessions.md
          - TTS and Voices: docs/api/tts-and-voices.md
          - Events and Streaming: docs/api/events.md
  - Benchmark:
      - Overview: benchmark/index.md
      - Metrics: benchmark/metrics.md
      - Runbook: benchmark/runbook.md
      - Results and Baselines: benchmark/results.md
  - Community: community/index.md
